body:
  text: 啓真禪師語録序真佛無口不解説法真法無言若為宣説所以迦文世尊於拈花會上示涅槃妙心飲光尊者破顏微笑何待語言文字借事顯理離即蘊默見聞覺知都為拈卻雞足首陳而來少林傳芳以後彼德山臨濟棒喝機鋒不屬有無中邊稍一眨眼即被人瞞卻如世之良驥見鞭影而行可為不涉理路不落言詮者也余以公務得寓荊南圓應禪菴與主師宗子開士坐談浮屠內典於師案頭揀閲語録二册展歷首尾見其規範謦咳倣佛大慧諸師詢其源派屬磬山千老人苗裔護國啓真禪師節主法席數坐名藍可為溯流濬源源遠而流長也不越月余即報升江浙師持語録索序兼餞余程余援手笑曰彼以三疊陽關正打旁敲余以五日京兆何暇饒舌師隨應云仁和鳧飛早燕都鳳詔忙余即唯唯夫明月之光非照乘同色旭日之升然爝火難并正如海蚌禪開口便見五臟肺腑真取心肝劊子手也所謂於一佛乘分別説三道殊半滿曲譬多方既云萬法歸一請參一歸何處是為序大清康熙二十八年己巳孟春月穀旦浙江杭州府仁和縣知縣楚黃王庶善衡麓甫題於黃鵠磯頭護國和尚語録序大雄正續五葉芬芳滹沱一派遍滿天下矣海內名師宗匠凡開導一方一國便有語録傳世不勝汗牛幾乎充棟也我迦文世尊四十九載説法三百餘會談經尚言未嘗説著一字向未開口時早已落二落三以致達磨九年不語顏子終日如愚老氏之多言數窮不如守中正同一鼻孔出氣千載合乎一轍也而世人第以文字語言支離問禪問道又何啻鄭州曹門遠之遠矣所以三教聖人豁然一貫無二無三其揆一也今茲護國啓真禪師者乃荊南遍老人後裔實磬山別老人的派傳臨濟正宗為護國濬源而棒喝機鋒電閃星掣衲子聞風心驚毛豎如大火聚觸之則燎卻面門某奉命歸省及門問道一日與師談及宗門中事因言即今孔孟在甚麼處師云吾常于此切俾余得首旨神怡果能于此摩索一番自有七通八達時節莫言大唐國裡無禪只恐無師誠哉是言也師出語録數册示余作序余首尾閲歷拈香祝聖上堂小參皆發前人之所未發模範規針皆合古人之所節符宛若香風花雨諸天贊嘆千古綱宗衲子規鑒宇內緇素孰不以師師之又何奚用余言是以沐手敬題于護國寺中康熙二十五年歲次丙寅孟夏乾清門御試一等二名欽召覆試賜宴體仁閣特用內閣撰文中書舍人開元李文淵啓真禪師語録序彙於萬者不可彌度也籥於一者不可思擬也非有以脫應感通塞之扃撇賾化緣淨之橐正觀側觀皆可指揮如意而無漏無礙則翳翳其逾伏者不能軋軋其若抽來有所遏去有所止擇焉而不精語焉而不詳矣語而為録詳之至矣程朱諸大儒之有語録蓋溯洙泗以規姚姒渾渾噩噩浩浩淵淵昭昭然揭日月而行者先聖後聖此心此理之同也西方聖人之教以冥悟為奧窔以言銓為郛廓顧有頓有漸無級無陘所籍法華自轉弘闡宗風者自漢以下代有傳人今聖天子一六合而光宅仁風翔洽上下草木鳥獸含生之倫罔不咸若而方外法侶亦得以白日靜傳青蓮微喻者為晨鐘暮鼓無所不備之大千世界余老於經生者也馬鳴龍樹之談茫乎未之有聞乙丑奉徵修郡志授簡於護國寺中因得與啓真師話碧雲今年春夏間師與諸開士閲藏畢乃出其所著語録屬序於余夫轢輻之不相侔而欲為之揚鑣脂轄甘苦之故有所難言然以吾道本末一致卑邇必自之理類通於師之發皇義蘊直見其拈弄指點活活潑地寓言名言大言小言雖離方而遁圓濬發於巧心機鋒觸處皆生機鋒觸處皆忘吾誠未識夫開塞之所由也噫聰明難矣而墮除聰明原不是漫無手眼智慧之相護國開山遍知和尚篤實沉著倣佛面壁氣象師屬磬山箬老人三代嫡嗣為遍公傳燈正派精通敏悟不從文字入而從文字入者偨傂參差瞪乎其後落第二義不落第二義師之印可者微矣誠非余之所得而言也時大清康熙二十有五年丙寅仲秋月穀旦賜進士出身原任江西管理通省驛傳鹽法道按察使司參議郡人胡在恪念蒿甫題於護國精舍護國啓真誠和尚語録目次序疏第一卷上堂示衆第二卷小參垂問法語機緣第三卷真讚拈頌傳第四卷贊偈佛事詩啓開堂疏伏以道振中原麈尾撝開天地眼法宏三楚棒頭點醒古今人此日津梁當代砫礎恭惟護國堂上啓翁大和尚猊座下合吉承嗣慧樹敷榮香宇宙五祖發焰智燈閃爍映兒孫藏閲蜂臺香霧喜環選佛處堂開荊國宗雷頻吼駭神洲綱維八荒久揚練達之經緯權衡十類概握造化之樞機大雄殿中展縛虎擒龍之手曲彔床下抒驚天動地之名深鎖密封空王法窟誰履迷獅陷虎老匠紅爐奚開匪假雷聲安啓蟄戶發世尊未發之旨傳達磨不傳之機鍛鳳烹龍敢藉鉗錘毒辣利人接物還祈寶臂牢拴三月桃花不待靈雲親睹九夏梅子專候護國重拈金剛圈觸著霜威而粉粹溈山器踢倒雪汁以無侵虎穴龍巢一喝七花八裂銀山鐵壁三拳東倒西歪破沙盆大家一齊扶起爛葛藤務令徹底掀翻十字街頭一任縱橫磊落太虛空裏更須隱顯翱翔九界蒙光四生沾利伏願皇家衍慶御殿增輝五色天花今朝試看廣長舌一味法雨此日豁開希有心若釋若檀同悟娘生面孔乃凡乃聖共契棒下宗風大衆翹瞻緇素讚頌不勝欣躍之至謹啓康熙二十五年三月朔一日李遇蕃盧調元等疏
