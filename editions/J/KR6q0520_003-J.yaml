body:
  text: 書記振聞編錄佛祖真讚悉達太子讚指天指地獨稱尊不動干戈也太平任是雲門手段辣知他雪屈是酬恩觀音古佛宮裝垂妙像聞思修入證圓通應心水月隨類現百億分身處處同彌勒終朝兀坐歡笑自若冷觀世人來往如梭拮据經營自苦奔波噫幾時得脫者凡籠怡怡快快也相我達磨涉水登山泛渺茫擬將佛法付梁王孰知不識安心術一葦凄凄暗渡航拈頌世尊初生由來原自可憐生豐儉隨家樂太平遍野田荒耘未得倏然耕動有人爭世尊在靈山會上目視青蓮顯露機破顏微笑在須臾尋常繡出鴛鴦看今日和鍼度與渠世尊因五通仙人問掬水月在手弄花香滿衣蜂蝶紛紛過牆去眨眼明人莫自欺迦葉尊者因阿難問世尊傳金襴袈裟外密密春雷起臥龍東君從不浪施功尋常一樣窗前月纔有梅花便不同女子出定事緩則圓著甚急如何若何總不必桃花無計避春風水到渠成路自直岟崛持缽野馬陽燄不暫停莊嚴色色淨殊因漁翁慣入驚人浪入水那沾涓滴痕僧問馬祖如何是佛顯大機來明大用曲談名相無繁重從教地裂與天崩堅若磐石穩若峰僧問馬祖離四句曲彌高和彌寡字經三寫烏焉馬有耳如聾有口如啞等閑一鏃破三關不知誰是其人者僧問雲門如何是諸佛出身處當機劈面似雷奔拶得東山水上行行到水窮山盡處別闡一路出雲門雪峰禪師因玄沙馳書至乃陞堂開拆見白紙愛重忘姑息文章教爾曹國清才子貴家富小兒嬌與琳書記個事人人本具貴在直下承當不須思量擬議覿體現前靈光示新庫司居常休莽鹵臨事莫匆匆平懷家和計照顧眉睫中示先副寺遜謙真道本逆順境和頻悟透浮名事受用無價珍示齡大德悟得浮生面先觀自己空妨身兼律物應用在其中示善悅眾和眾不隨流任他呼馬牛不被色聲轉自有出人頭示孫印素正法續滹沱西江一口吞門庭光赫奕分付與兒孫示元監院箇事覿相呈拈來一度新耳聾三日後消息許誰親恩母傳某幼實愚頑不省所怙厄值兵燹顛沛流離無所不至不幸父值早歿家室瓦鮮母子相依擇木無方六親無盻顧之休戚族勢乏憐恤之垂照世籍荊門里閈許氏之子父諱本璉母李氏零丁難支是以奔南走比母氏旋繼相亡愧恩罔極之莫報深追恃怙以曷酬惟憶大雄氏之洪慈遂披緇以報二親正謂菽水未進涓滴想像莫報萬一者也適閱天童潤禪師語錄內載恩母傳文且有勸請同志有莫報二親者勉作報恩之文以曉將來緇素庶我瞿曇之種姓慎勿以楊墨同日而語也某不解作文止敘從前險釁顛末以告諸同類耳倘或有能思報二親者概然踵效成文貽世俾某得思慕二親之鬱衷誠格稍報生身之纖毫也且吾教典云一子出家九族生天噫諸佛之明言自不爽于錙銖也乃值母誕之辰偈曰吾母誕辰日為兒報答時禮拜求佛恩生天在須臾述古尊宿值母誕偈曰今朝乃吾娘生日揚起佛前長命燈自作自炊還自喫替娘齋了一員僧
