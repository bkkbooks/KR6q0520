body:
  text: 書記洪信編録贊董居士真皤然一叟鳩杖隨身倣佛似習池蘊公語續傳燈原來是復寰居士諸方見聞有女遣嫁無男當婚相聚口團圞大家話無生董二居士唪金剛不輟這女善人具丈夫相不去戴笠參俱胝終朝鳴魚唪金剛果修淨居善因庶免臨時周彰咦若要勘破來往師僧問取趙州和尚自贊者個阿師頂墟頭顱人前倔疆肘後懸符與世恬然受靈山怤三主護國重新寺圖接續東山成滯貨授售自由任所孚殃及叢林數十秋至今光被滿甸都偈募鐘果海祗因纍劫專布金檀度任隨緣一椎驚惺利名客好向精藍造勝前造佛福筵勝會廣無邊佛面光輝已面圓金像嚴裝無漏果螽斯祿算水綿綿燈點塔何妨燈一然光明朗朗照三千佛光遠被清光徹濟世心香萬古傳米未轉法輪食轉先金牛飯桶至今然千家一鉢鐵丸子古佛肚中萬萬年齋靈山自古選佛場五百高僧日日忙為報信檀傾積廩大家出手扶宗綱茶盧同七碗非奇特趙老三杯豈是狂會得無多佛法子客來無語令人忙柴運水搬柴皆妙用迎賓送客乃家祥拔山舉鼎雖意水足柴方菜更香衣然燈播種於當年心印惟憑一縷傳大庾嶺頭千萬重始終一念戒珠圓佛事本寺耆宿聞一老師火鳳凰臺畔起暮煙鵝池一滴水連天天王祖庭巋然屹西來大意又重宣四大原假合五蘊若浮漚世緣滄海變去來鹿夢囮惟我護國聞翁來自鼎山氣宇如王有擔鈔之風恨未遇婆子點化迄到護國親見忍祖雖無疏鈔可焚末後句子已當面分付了也即未撩起便行且喜未到臘月三十日可謂唧溜漢子具衲僧手眼舉枕公案不被侍僧勘破即今功圓果滿絶後光先一句又作麼生喝一喝云皮膚脫落盡惟有一真實噫一任浮雲變今古牟尼徑寸滿空春瑞白禪人舉火師云幾回生幾回死生死悠悠無定止證入無餘大涅槃常寂光中無異此今日撥轉舊家風翩翩隻履西歸逝五十六年成底事者回方脫娘生褲且道娘未生時著個甚麼顧左右云汝等諸人道道看若無山僧未免借手行拳去也所以道亡僧面前觸目菩提活人路上死人無數上人會麼喝一喝執火炬云大千沙界現全身獅子獨行無伴侶舉火金不博金生死海中無向背楔能出楔衆生諸佛正相當所以道無明實性即佛性幻化空身即法身如是則山河大地同轉根本法輪鱗甲羽毛共證真常實際法爾如然不假穿鑿今日山僧為汝覿面舉揚上人還承當麼若能如是便可超佛越祖出死入生其或未然為汝更指一路以火炬打圓相云有水皆含月無山不帶雲舉火歷劫不曾迷云何方始覺生死及涅槃個中無處著所以全體恁麼來則來無所從全體恁麼去則去無所至來無所從則生本不曾生去無所至則死本不曾死既無生死則當處湛然覿體現前不真何待以火炬云上人珍重去無明山上起雲雷生死海中為雨露入塔生亦非成死亦非壞直下會得頓超十界不勞彈指塔門開達者同遊涅槃海弔不礙大師昔日同參今朝覿面兩個五百原是一貫不須拍手哭蒼天拈出秦時𨍏轢鑽展坐具云且道阿誰證盟一任諸方剖判天童老人諱千花叢裡現優曇水出高源青出藍誤賺不知多少衆前三三與後三三茲屆十一月十六日乃我天童老人初度之辰若乃仁義道中世諦流布則且置只如不涉程途還假相見也無乍收宿雨孤雲斷明月一天方夜寒磬山老人忌砧杵千家夜星河一雁秋突出殊難辨明珠暗裡投是以大人具大見大智得大用展鶤鵬之翼奮獅子之威蓋色其身超今越古拈起栗棘蓬放出金剛圈整齊佛祖號令人天掃出三玄三要滅卻正法眼藏殺人刀活人劍斬釘截鐵騎虎頭據虎尾絶後光前直得三賢十聖膽顫魂驚盡大地人亡鋒結舌使德山臨濟再生也討頭惱不著此是我老人一生受用不盡底間家具今日因齋慶贊不妨為衆拈出雖然如是以此見他老人譬如掉棒打月何啻萬里崖州亦大遠在乃召衆云還見老人麼一堂風冷淡千古意分明挂鐘板馬祖建叢林百丈立規矩原為雲水趨投老病無依不是自居自食東邊蕩來西邊嬉今日重整舊家風祖佛龍天生歡喜噫板鳴要齊集舉止須威儀挂火牌趙老茶三甌金牛漆桶快要開者個鋪成人不自在飯熟任開柳僧集須鳴牌供養無心人千佛從茲來監齋監齋大士菩薩化現文殊文喜打成一片香積調和一味任他凡聖交參國清護國無兩樣休言饒舌老豐干伽藍信施祗園財廣金布續智者燈均為慈護佛法當茲秋晚全仗金湯密固勿使寒拾檢點方為伽藍淨土齋榜先炊無米飯僧多須問金牛造若何選佛場開憑妙手傾囊出廩在檀那詩禮開山師祖遍老和尚掬水從來香有源卓飛燈續是師恩遙思面壁傳心淨始得開筵法侶尊寶地不隨風物改慈雲常共雨花存宗乘竊恐輸門外聊為搬柴衍後昆九日龍山奉陪諸公作散步高原外人煙入杪秋烏檣過虎渡鴈字帶龍洲秀色三峰出嵐光八嶺幽參軍落帽地風韻有名流章臺春日城隅迥無邊野色來楚宮何處是梅影自徘徊堤遠人煙曲碑殘字迹灰昭王猶有祭歎息此章臺天皇山有感天皇傳法地勝迹自依稀世遠銘鐘古時移堂柏非僧繇不可見開子亦難幾開子明時詩僧也惟有青青草春來是處歸黃鶴樓危檻層巒壓萬家漢陽江夏對芳華漁舟遠浦歸人晚小院殘詩落照斜一枕黃粱真大夢數聲仙笛在梅花縱觀千古東流外倍覺浮生是井蛙小姑山崔嵬屹立似天關推卻篷窗見一班洗鉢方逢江日霽挂帆正逐海潮還人天誰辨空中相流峙常存大界間自念非因經卷往堪將蹤迹負名山午泊采石古柏蒼松裡危橋水徑通苔青全覆石蘿緑似嵌空江海風帆上乾坤午夢中琴聰非我事自笑入詩筒金陵日夜江聲過石頭金陵王氣自千秋人間多少欷歔事莫只空空厭比丘舟次金山矗翠超人境乘流到上方江聲疑地盡海氣與雲翔坱圠蛟龍護洪紛鴒雀藏笠瓶何處著開士正升堂虎丘寰宇傳名勝今來見虎丘生公能説法風俗尚同遊山色籠香積鐘聲帶棹流偨虎諸幻影安用敝衲愁嘉禾煙雨樓相傳買臣墓在此憑欄一望海潮東萬樹千村煙雨中雅趣詩間尋杜老輞川畫裏見王公塔邊古墓歸憑弔世上浮名互色空為報仕途留滯客牛衣何必泣時窮靈隱寺鷲峰何代自飛來古剎巋然冷石臺滄海東坑日月杳直從高望一徘徊五百羅漢堂西天東土竟何如海藏龍宮任所居深淺由來憑象兔三乘誰與破空虛西湖湖光蕩漾錦攢天亭榭花間照客船惟有緇衣隨白鷺浮沉不計到誰邊禮天竺大士無邊無象也無塵合掌虔登又一新十二觀中千處現不須一喝始驚人送月師入京三載琳宮一日成從茲報國又垂名王家功德真悠久鄭重吾師持鉢行奉和胡念蒿先生夜坐韻時修志寺中著述到禪林掩關自苦吟黃花經雨暮紅樹綻秋深文獻山川色圓通聖佛心紫茸趺坐下鐘罄一沉沉元夕豐登最喜宜春晴萬彙千葩入眼生花月光輝人共賞火燈交處是雙城新年一樣梅花又改年起看風雨卜蠶天竹爐瓦灶無新火榾柮猶然昨夜煙明和尚歸萬壽菴數載祗園法席開匡徒領衆意徘徊眉山俊秀荊芳遍雙桂枝條任剪裁哭徒惟中息慈早歲便相隨坐穩蒲團垢欲離逝水於今悲弟子孤雲自昔愧人師榮枯朔晦誠難問往返東南亦可思最是歸家先瘞母空門不負背倫疑挽揮印禪師虛空雖世界不謂遂無生雅志尚高遠參鋒喜縱橫相知成一夢客邸化浮名嗟彼荊門路能忘太上情與爻人話別問訊何暌隔全然鴻踏泥靈山同記別濟水共分溪千里真如夢萬機不可齊相逢參飯罷一任又東西淨土曾無藥石偏生病雖有蒲團不坐禪水月願王松樹案數枝香透瓦瓶遵其二祈假逞生淨土身落紅偏苦妒余春燈前燒卻長生術剩買黃金鑄二親閲玉泉志響往名山已數秋幾番策杖欲經遊會心若晤堆藍狀入耳方知四絶留鐵塔鑏金光影燦珠泉跳玉掌趺求南燈永續曹溪派北秀誰宗一線頭閲藏萬古鴻濛外三生智慧中妄真空相回仙佛聖賢通寶鼎占雲氣珠龕映日瞳僧寮翻貝葉盛代祝年豐奉和彝鎮嚴護法貪佛閣詩佛日中天無盡蘊大千纍億見恆沙四門已辨人天界五衍何岐南北家寶閣麟章開願力祗園龍樹有光華從今鈴鐸聲聲裡喚醒塵衣與亂紗呈修志諸先生天地有大文靈秀有奧宅不朽在立言古今傳載籍所藉為國華文獻增舄奕吾荊劫灰後什一鮮千百聖朝今光被右文無遺策先生奉徵聘乃作十笏客直筆發潛德軒軒振風格玉韞山自暉幽蘭揚芳澤與其有諛美不如有己責即茲荒陋寺亦得備前迹昭昭人耳目原非私所適竊窺兩月中討論窮晨夕如此著書心信足垂金石夢先師若老和尚不知大夢是何人夢醒猶疑見是真應為迷途煩指點香焚一瓣到清晨夏晚同陸吉芳淑二監院納涼共坐古柏下涼在風生裏時方苦炎熱衆心各歡喜有似當渴飲不必廉泉水相彼風中幡搖搖孰為此以此觀一切無定者何已蝙蝠穴層閣旦夕反相視至人寢不夢夢覺有妙理坐起散步行誰行亦誰止蘭綺石黃甕便是家幽香原不逐繁華瓶邊澆水籬邊蓋相看年年自作花牧牛頌引牧牛之譬其年久矣自南泉拈掇頭角轉露普明添足繫之以頌宗教能詩之士雜然賡之然自有者片田地便有者個畜生為甚麼有等一時討鼻孔不著動著犯人苗稼且利害在甚麼處請向葛藤窠裡摸索未牧意氣昂昂頭角高牧童鞭執趁途遙深山曠野草漫地信嘴滿腮觸異苗初調牢拴鼻孔乘時穿緊把繩頭漫著鞭畜養多年愚拙性始知今日費心牽受制出門或可自相隨放去收回暫少馳旦暮小心頭腳穩水邊林下莫教疲回首緑楊堪繫始回頭僵屈援收漸漸柔休怪山童性未怠頃然失卻漫相留馴伏山南山北水溪邊穩伏傾誠犁祖田不帶繩頭飲水草晚歸搖尾不須牽無礙牛人兩兩俱如如聲色相忘各不拘松石安間穩坐睡笛腔無韻樂餘餘任運紅紫三春野色中溪南溪北草茸茸本分水草隨分納快活山童午睡濃相忘束手相忘還未中此心期與岫雲同雪牛既到白裡獨朗桂輪照碧空獨照威音那畔本相安叵耐有生始戀纏今日方知娘鐵面者回參透祖師關雙泯人牛屏迹事難明者裡斷然向孰陳鐵餒咬來當面剝祖師無處去藏身啓上提學胡先生啓恭惟老先生護法才雄八座彩映三湘志同范文正輕肥溫飽俱忘學似陸宣公曠達浮華盡脫一登其門則聲價垂珠前諸當事以董修郡乘請駕臨山寺毫乏供陳慚愧殊甚深荷垂青詩箑普及儼若天風下頒擲地金聲謹供常住真乃學士王帶以志銘德面謝不宣上江南徽州郡伯亢護法啓睽違三月倏焉如昨恭惟大護法關西名家隴右一人朝野欣瞻廟廊生色前此按至不遑應迓叨承香供至今銘切恨不獲時親左右為悵特簡候安佇擬高擢司馬勿忘記莂靈山政事之暇休言饒舌豐干聚晤談心自有期在臨穎曷勝企仰復陰護法請藏啓轉眼簇新日月雖爾恭惟護法荊南佛護法海金湯寇借晉西汾黎戴化育之恩膏謁天飛鳥楚國飄香風于梓里四野歡騰萬彙增麗寺叨護法奇緣喜出望外法寶功德名垂千古途遙未遑致賀正慕間忽從事公馳翰至開函宛見芝眉恨無縮地可親猶垂盼殷殷曷敢當耶詢其福禧駢臻德政浩渺不勝欣忭且言待以國士主賓會合不偶實三生幸也專啓候安延冀駟馬題橋策杖侯門以話無生錫帶之施永奠祇園也肅此荒函不勝主臣嘉興楞嚴經坊夏繼寧
