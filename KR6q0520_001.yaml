body:
  text: 書記振聞編録上堂康熙二十五年三月朔一日開藏合郡檀越李遇蕃盧調元等齎啓敦請師受請上堂指山門云老趙州曰上等人來床上接中等人來床下接下等人來三門外接護國又則不然一任王公貴人宰輔檀護任緣接應何故聻是法平等無有高下一彈指頃八萬門開龍象雲集凡聖交參高趨毗盧界超登解脫門噫護國多瑞色格外一枝香彌勒此老兀坐不涉春秋常言等個人來山僧出入住持多年想是其人似乎看來原無兩樣憶威音那畔自同一鼻孔出氣今日紹繼祖燈于此秉拂升堂定要露柱懷胎石女生兒爾列坐天王也當捧鉢面前鐵樹也要開花韋馱三洲感應四部外護手擎寶杵無忘付囑柴方水便事事一如五湖龍象在叢林內外魔障俱遣除異日功圓果滿印證千佛一數佛殿此殿此佛並此石山僧歷禮已多年今朝仰承恩育力願展翹瞻法王前據室龍蟠虎踞鳳翥鸞翔威儀整肅入室升堂勿謂方丈十笏此室虛空等量維摩亙古亙今山僧意氣昂昂拈疏少室單傳正法黃梅密付綱宗蒼頡鳥跡古篆孔聖精一執中若也於斯薦得卻請維那宣過指座虛空既無量寶座一同倫重振舊家風拈來一度新升座此一瓣香原自瞿曇播種淨飯抽芽飲光密植于西乾達磨移來於東土爇向爐中專申供養靈山會上經律論藏主本師釋迦牟尼文佛伏願千華競秀五葉芬芳此一瓣香無高無下無聲無臭放合捲舒自由自在信手拈來恭祝當今皇帝聖躬萬歲伏願堯風永播舜日恆輝次及滿朝文武郡邑宰官十方檀護經藏請主文學居士在會善人伏願金城永固常為護法之津梁出作入息永沾盛世之王化次一瓣香宿培智種纍劫薰修知恩報恩飲水思源端為供養本寺功德主惠藩金靈護國堂上開山師祖遍知太老和尚正拈香云此一瓣香向心地栽培心地長養楚峰資其靈秀湘澤潤以光華冤頭債主騫劄相逢端為拈出專伸供養現住五祖別峰老和尚用酬法乳戒源之恩斂衣就坐祇園和尚白椎竟師植杖云諸佛出身處東山水上行會得其中意日午打三更衆中還有鏖戰棘圍未遂生平出來與拄杖子相會僧進云臨濟祖師垂一句語須具三玄三要有權有實有照有用如何是第一玄師云瞬目涉關山如何是第二玄師云森羅宇宙寬如何是第三玄師云離相絶言詮如何是第一要師云妍醜精粗妙如何是第二要師云七星光晃耀如何是第三要師云千差同一照如何是權實照用師云高山流水知音少鐵笛無腔信口吹進云三玄三要蒙師指開堂一句請師宣師云拈來一度新僧問云萬井人煙環鳳闕三春花鳥繞龍宮如何是護國境師云高著眼進云世界三千皇化裡人天百萬法王前如何是境中人師云且禮拜著進云人境已蒙師指示寶藏重開意若何師云切莫眼花僧問云法鼓敲鐘即不問四衆雲集是何祥瑞師云爪牙突出進云正是雲散天邊月幸喜春來處處花師云遍界不曾藏僧問云昔世尊四十九年說法三百餘會談經和尚今日上堂說法未審是第幾會師云我這裡不設會數進云弘宣大藏檀信皈依謂是現前獲福或是當來證果師云山花開似錦澗水湛如藍野宿道人進云久蘊囊藏未蒙施設今臨大座指示迷津如何是正冷當行師擬棒道人便進云一句了然超百億何須門外駕三車今日護國堂上因甚又檢經閲藏師云不妨錦上鋪花僧問云儼然靈山無二披閲大藏有三如何是第一法師以杖卓云見麼進云除卻又如何師一喝僧拂袖歸位師云且喜天下太平乃曰誠上座自揣愚陋全無長處秖宜遁跡埋頭以了平生入廛垂手非我能為叵耐境風灝灝直逼其人雖寬大地亦無回避茲承諸宰護之命不得已雲頭按下將錯就錯未免掉臂因行重拈雞足之花畫貓依樣借設然燈之座一向把住牢關窺覷佛祖無門今朝打開八字要見遍界真風但知心不負人一任諸方疑著茲者滄溟乍攪活淹四海差異獰龍爐韝初開生煆五湖伶俐衲子任使精金百鍊也須再著鉗槌縱饒頭角生成到此盡教點額千聖直得齊立下風青天也須喫棒所以道欲知佛性意當觀時節因緣時節若至其理自彰若是本分道流自然應用無虧隨流得妙闡揚佛祖門庭開鑿人天眼目出沒縱橫得大自在拈起也天回地轉放下也草偃風行說甚無邊香水海重重華藏界纖塵非隔只在目前試看章華臺香風藹藹文筆峰瑞氣騰騰仲宣樓萋萋芳草曲江門𠽼喤遊人輝聯虎渡氣接龍山山河大地草木叢林明暗色空人物鳥獸無時無處不轉無上根本法輪以致經藏禪海律論萬一離即語默文字見聞覺知之心一時拈卻乃至塵說剎說熾然說無間歇又何必敲鐘發鼓入室升堂拈槌豎拂然後方為說法耶吾佛世尊說法四十九年談經三百餘會始從鹿野苑終至跋提河于二中間未嘗說著一字須知更有向上一著在稍待開藏時與汝諸人道破昔我臨濟祖師于滹陀河側住個院子一日上堂語普化克符二上座云我欲於此建立黃蘖宗旨汝二人須成褫我珍重下去一日普化上來云和尚前三日說甚麼濟便打後三日克符上來云和尚昨日打普化作甚麼濟亦打趨下法堂你看他三大老一呼一應你唱我和扶豎門庭即如我護國一自惠藩創建遍祖開山荊志名藍亦預其數吾儕履戴歌哭興廢幾墜志氣有年蚊力難支今承合郡護法諸山尊宿同門師友大家出手共勷勝事命登曲彔黽勉人前取笑大方然須效濟祖家風體失人遺意不妨更為頌出偈曰痛棒三遭永莫孤法門從此滿江湖不因張使呈蜀本昭烈何緣振民圖下座報國寺月老和尚設齊請上堂維那白椎竟師云守磯持鉢一山翁草笠荷蓑繫短蓬三十年來竿不放垂絲千尺待獰龍衆中還有負命者麼問答不録師乃云孟嘗門下珠履三千金谷園中繡襦八百怎似我衲僧家借來香飯餉千聖於同堂三變淨坊集分身於一處進一步則運動無邊世間網退一步則踏翻百億大風輪不進不退坐斷十方猶未是衲僧全體作用如何是全體作用舉拂子云會麼昔龍牙禪師云踏遍名山到因腳心苦年深與襪著如今年老不能行手裡把柄破木杓五祖演云白雲者裏又不然腳也不能著草鞋手也不能把木杓端坐受供養施主常安樂今日護國報國總不然遊遍名山天盡角無端老被住持縛院門倒塌應重新著卻草鞋仍把杓只如酬答一句又作麼生滄海耕翻應有秋鐵酸餡煮黃金粒踏得故鄉田地穩護國報國總歸一下座承天寺德惠師翁同徒子霞師請上堂白椎竟師云參禪須是英靈客敵聖還他獅子兒選佛若無如是眼假饒千載一奚為有問語者出來張居士問云重開寶藏大轉法輪諸佛是他家奴經卷是故紙和尚今日轉個什麼師舉拂子云正眼觀看進云白的是紙黑的是墨喚甚麼作經師云莫將閒學解埋沒祖師心進云恁麼則一番提起一番新弄假還成真禮拜歸位師云多虛不如少實乃曰欲見佛性證大涅槃必須堅持淨戒衆生受佛戒即入諸佛位位同大覺已真是諸佛子戒為金剛王寶劍斬邪見之稠林戒如踞地獅子摧群魔以潛形戒為入道之階梯戒乃成佛之正因戒為苦海之津梁戒乃生西方之公據耳妨非止惡長養聖胎梵網經云孝順父母師僧孝名為戒戒之一法衆妙之門也我祖師門中還用得著麼若用得著丹霞不應掩耳若用不著六祖不應受戒汝等諸人還知麼所以仲尼云血氣未定戒之在色血氣方剛戒之在鬥血氣既衰戒之在得可為儒釋一貫千載同風者也昔仰山祖師問中邑洪恩禪師曰如何得見佛性義邑曰譬如一室有六窗內外俱有一獼猴東西俱喚猩猩俱應仰曰設若外獼猴欲與內獼猴相見內獼猴睡熟時如何邑下繩床搊住曰猩猩與汝相見了也還知有六根門頭互用者麼只如一心不動又作麼生如王秉劍由王意殺活臨時得自由今日乃叢蘭耆宿德惠師翁子霞禪兄賢師賢徒是父是子來我護國辦供可為現比丘身而為說法汝諸新戒大德要識因齊慶贊麼耆衲同寶掌壽算等籛傳戒下座鄂渚吳護法為新戒設齊請上堂師云達磨未傳心地印釋迦未解髻中珠有人若問西來意還有西來意也無汝等諸人道將一句來良久如無山僧未免借手行拳去也如何是西來意薰風自南來殿閣生微涼乃云佛說一切法為度一切心我無一切心何用一切法如斯會得則知人人本來是佛個個常光現前古釋迦不先今彌勒不後是法住法位世間相常住乃至王宮降跡雪嶺修因大似空拳誑小兒黑頭換眼睛雖然如是也須過量人承當恁麼事所以殺人不眨眼的漢子立地成佛立地成佛的漢子殺人不眨眼以致靈山會上廣額屠兒放下屠刀便云我是千佛一數必竟到家一句又作麼生突起一念精進心入聖超凡剎那間昔金牛和尚問龐居士云生心受食淨名早呵去此一機居士還甘否士云當時善現豈不作家牛云豈干他事士云食到口邊被人奪卻牛便行飯士云不消一句子若是誠上座則不然向金牛才開口時便與一掌云既不生心行飯作麼今日鄂渚吳居士素懷上志有龐老之風每聞一善則拳拳服膺一睹勝事共勷贊助捐資解裝來我護國辦齊供衆汝諸閲藏闍黎新戒比丘也要商量者一句子又且如何見者聞者生歡喜心施者惠者長無量福螽斯振振以篤周祜下座本府分署護法劉張王都暨衆護法文學設齊請上堂師云祝一人無疆之壽開十方選佛之場建殊勝因作奇特事須是作家漢共相激揚始得乃云一句當天萬機寢削一塵透脫千界光輝諸佛威儀進止諸所作為無非佛事或有佛土以佛光明而作佛事有以諸菩薩而作佛事有以佛所化人而作佛事有以菩提樹而作佛事有以佛衣服臥具而作佛事有以飲食飯僧而作佛事有以園林臺觀而作佛事有以三十二相八十種好而作佛事有以虛空而作佛事有以佛身而作佛事衆生因以此緣得入律行嚴淨毗尼弘範三界登般若此岸達菩提彼岸不歷化城徑登寶所有以夢幻影鏡中像水中月空中花熱中焰如是等喻而作佛事有以音聲語言轉化多方鼓舞作興而作佛事種種功德無非舉揚般若示現檀度見聞隨喜禮拜贊嘆而其獲報等無有二且道如何是諸宰護轉大法輪作大功德得大受用現大人相第一義諦聚沙指爪皆佛事設化多方等大千桂茂蘭芳看振彩鳳詔麻宣待喬遷傳戒下座城西原任副府高曹護法夫人設齊請上堂祗園和尚白椎竟師云渭水溪邊一古錐筒浮香餌定實虛竿頭絲線憑君手直釣原求負命魚有問話者出來僧問云拈花即不問微笑意若何師云正法眼藏瞎驢邊滅進云西來的旨乞師指示師植杖云會麼進云春來冷暖桃花浪正是魚龍變化時師云領取一棒僧問云人天百萬拈花示衆護國堂上四衆雲集佛祖心印請師拈出師云放汝三十棒進云後供純陀即不問設齊護法請師酬師云也須因齊慶贊僧問云山門獅子迎風笑師云切莫眼花進云巖前石虎抱兒眠師云你見甚麼進云海底泥牛銜月走師云正好供養進云崑崙騎象鷺鷀牽師云突出難辨僧進云如何是奪人不奪境師云見月休觀指進云如何是奪境不奪人師云歸家罷問程進云如何是人境俱奪師云船子和尚進云如何是人境俱不奪師云打地禪師進云人境已蒙師指示開堂一句請師宣師云獨坐大雄峰師曰居家修善行把手入山堂飲食供清衆信心豈易量須知信之一字乃成佛作祖之基本了生脫死之根由但能心心匪間念念不忘懺罪罪滅求福福生轉女成男具大人相豁開無為實相門一超直入如來地然雖如是古人云心不是佛智不是道到這裏十影神駒追不及天眼龍睛覷不見汝等諸人還有互相契證者麼昨日珊瑚枝擊碎今朝法雨灑前溪昔王常侍問臨濟云者一堂僧還看經麼濟云不看經還習禪麼濟云不習禪侍云教伊做甚麼濟云總教伊成佛作祖去侍云金屑雖貴落眼成翳濟云將謂汝是箇漢常侍已是煆過精金濟祖可謂鉗鎚本色一時主賓唱和固是觀光今日較量猶缺一著且道那裡是缺一著具眼禪流試請辨看值茲衆護法夫人來我護國辦齊供衆我者裡也不露手露腳一種平懷看經的教伊看經習禪的聽伊參禪持戒的教伊讀律禮誦的任伊禮琴何故聻直須頭正尾正那管成佛作祖于此際會也須依經贊揚若人散亂心入於塔廟中一稱南無佛皆已成佛道下座佛誕日正紅旗衆護法設齊浴佛本寺方丈和尚云金佛不度爐木佛不度火泥佛不度水真佛家裡坐舉遵布衲浴佛次藥山云者個從汝浴還浴得那個麼衲云把將那個來藥山休去藥山雖爾分星撥兩要且句裡藏鋒布衲雖是截鐵斬釘未免落他圈套設使藥山信手拈出布衲又安肯放過汝等諸人要會藥山意麼大家出手共沐金軀雪和尚偈云擾亂天宮降梵宮指天指地闡宗風鍊得黃金丈六體沐軀何必用九龍古今原不離當念十世於今總皆同震旦曹溪一杓水驀面澆頭酬祖翁如何是第一杓是則名為報佛恩如何是第二杓鷺鷀下田千點雪如何是第三杓黃鸝上樹一枝花明和尚偈云淨梵王宮生悉達九龍吐水洗心月幾番捏怪弄精神卻被雲門要打殺乃喝一喝舉杓澆一杓云還安得第二瓢惡水麼知恩者哂揮和尚偈云呵呵對佛云終日興妖作怪大千被汝迷惑周行七步驚誰鼻孔原來無別且道浴句作麼生阿耨一滴水淵源流不絶恆觀和尚偈本源心地水灌洗虛空身若解如是沐是即報佛恩遂浴大衆舉偈同沐贊揚四月八日圓菩薩戒荊州府吏科秦護法同衆設齊請上堂師云大座當軒熟敢窺廣長舌相吼如雷座中若有仙陀婆不煩文殊下一椎乃舉世尊一日初生便乃大驚小怪手指上下云天上天下惟吾獨尊可為知禮大丈夫漢固當如是眼空四海傍若無人獨是探頭大過樹高招風譬如靈龜負圖自取喪身之兆未免雲門看孔著楔見義勇為雖然如是也未免撞著一個惡辣的亦未肯放過他在所謂惡人自有惡人磨前車既覆後車當戒山僧到者裡不敢多言只得退身有分或云把手牽他行不得惟人自肯乃方親要且不是這個道理忽有人言也是做賊人心虛卻許他具一隻眼今日乃浴佛誕辰閲藏事繁不暇贊頌偶記得徑山千指老人有個世尊初生的頌子不免舉似大衆譬如鬧市裡拋磚打著一個半個也未可知七步周行也不妨指天指地便即當大風吹倒梧桐樹自有傍人笑短長你看他作家等閒拈出便搔著人癢處山僧亦有一偈雖不敢並駕乃可謂東施之效顰指天指地獨稱尊不動干戈也太平任是雲門手段辣知他雪屈是酬恩衆中還有知恩報恩者麼點石化為金玉易勸人除卻是非難傳錫圓戒下座檀越供衣上堂師云頭陀那得有金襴白賺人家倒剎竿何似虎溪無量相等閒拈出大家看乃拈衣召衆云高著眼即披乃據座云獅子窟中無非獅子栴檀林內純是栴檀所以大人具大見大智得大用不見道踞地蟠空勢未休爪牙安肯混常流天教生在千峰上不得雲擎也出頭下座東城沙草二市南關外各寺菴廟衆師友設齊請上堂祇園和尚白槌竟師云當爐不避火方是好手灶裏解添柴始稱作家乃曰常啼菩薩賣卻心肝因般若以東請善財劬勞煙水為知識而南詢雖皆重法輕生其奈忘家失業殊不知光吞萬象人人有衣裡明珠貴踰娑婆個個韞懷中至寶千靈一致何用穿過萬古常如匪從人得所以達磨不來東土曹溪白浪滔天二祖不往流沙少室清風匝地秪如恁麼會畢竟列焰分燈是誰聯芳續焰昔有婆子請趙州轉藏經州乃繞禪床一匝云報與婆轉藏經已竟婆云比來請轉全藏胡為轉半藏耶徑山乃云從饒繞須彌山百千萬匝于婆子分上亦只得半藏師云老老大大只解順硃描墨孟八郎漢便恁麼道謂不下禪床始恰婆子意保管讚嘆有分若恁地見解饒你將五千四十八卷燒作紙灰揚向東洋大海我也只你向鬼窟裡作活計要見婆子則易要見趙州則難以手拍一拍云不入驚人浪難逢稱意魚下座城西戴申文學護法設齊請上堂祗園和尚白槌竟師云寸長尺短三平二滿覿面相呈語言道斷問答不録乃曰鳶飛戾天魚躍于淵大道真體不離目前逝者如斯不捨晝夜至理湛然原無虛借月浮水面古鏡舒光雨滴簷前梵音說法是以青青翠竹總是真如鬱鬱黃花無非般若一棹舞長江為尋格外知己半綸拋巨壑要覓透網金鱗金鱗未必全無知音幸然巧遇正與麼時主賓道合水乳和同鶴曳蘆汀鶯吟柳陌畢竟如何慶賀知音不用徽絃奏流水高山竟自明舉大通智勝佛十劫坐道場佛法不現前不得成佛道甕裡何曾走卻鱉靈山會上廣額屠兒放下屠刀立地成佛不是性燥漢大集會上有魔王語佛云瞿曇我待一切衆生成佛盡衆生界無有衆生語言名字我乃發菩提心捏目生花作麼三個漢亦未足觀光汝等諸人莫有過渠一頭地者麼出來試說行履處看良久云若無山僧不免放洞山麻三斤去也七寶畫牛頭黃金為點額春晴三四月農人皆取則萱齡算期頤蘭桂徵夢協試看熊羆兆麻宣紫泥冊何故聻一舉鴻鵠千里飛鑽雲鷂子與天齊鳳凰不是凡間烏為瑞為祥自有時下座城西諸山衆耆宿師友設齊請上堂祗園和尚白椎竟師云踞師子之座登曲彔之床撾塗毒之鼓張漫天之網一任起剪頗牧也須拱手歸降有當鋒者出來問答不録乃曰舉手攀南斗回身倚北辰劍掛眉間符懸肘後一言之下蕩掃攙搶一句之中奠安家國直饒恁麼猶是時流舉措若踏著向上階梯說甚猛虎項下懸鈴饑鷹爪邊奪肉任使兩曜東行星辰易位乾坤翻覆佛祖潛蹤不妨于坐臥經行神通遊戲如是則何用高眠太嶽泛宅五湖方將混勞侶以為儔舉諸魔而共作于是東西南北四維上下出沒勇施天人男女若僧若俗聲聞緣覺菩薩諸佛變迦文為無量化娑婆為極樂一為無量無量為一大中現小小中現大于一毛端現寶王剎坐微塵裡轉大法輪皆不出時節因緣所謂陳雲橫海上拔劍攪龍門舉臨濟同普化一日到施主家齊次濟云毛吞巨海芥衲百川為是神通妙用為是法爾如然化便踏倒飯床濟云得即得太粗生次日二人又到一施主家齊濟云今日供養何似昨日化亦踏倒飯床濟云得即得太粗生化喝云瞎漢佛法說甚麼粗細濟不覺吐舌二大老顯大機大用發明黃蘗心髓即不無要且腳跟未點地在今日乃城西諸方尊宿師友捐衣鉢之資來我護國辦齊供衆我這裡也不搖唇鼓舌大衆也不興波作浪何故聻既逢家裡人要說家裡話所以道面上無嗔供養具口裏無嗔吐妙香心裏無嗔是真寶無垢無染是真常如何是諸禪翁大家出手的作用大道原來無拘束信手拈來事事全一把柳絲收不住和煙搭在玉欄杆下座城西袁賀紀衆檀越設齊請上堂祗園和尚白椎竟師曰水不洗水金不博金青天白日亙古亙今山僧到此插手不入汝等諸人還識自己是仰山麼曹溪波浪如相似無限平人被陸沉僧問云如何是護國家風師云主賓融會理事雙彰進云如何是護國人師云抬頭看進云人風兩意蒙師指西來大意又如何師卓杖云會麼僧問古人云供養百千諸佛不如供養一無心道人無心道人有何德百千諸佛有何過師云財法二施凡聖一如乃曰薰風藹藹炎日熙熙荷開水面槐影篩日處處呢喃紫燕聲聲睨睆黃鸝趙州柏樹子洞山麻三斤如斯見得全理全事正眼覷來無非道場所以光嚴童子出毗耶大城維摩詰方入城童子作禮而問曰居士從何所來維摩答曰我從道場中來童子曰所謂道場者何所是士曰直心是道場無虛假故發行是道場能辦事故深心是道場增益功德故菩提心是道場無錯謬故布施是道場不望報故持戒是道場得願具故忍辱是道場于諸衆生心無礙故精進是道場不懈怠故禪定是道場心調柔故智慧是道場現見諸法故乃至一念知一念法是道場成就一切智故善男子菩薩應諸波羅密教化衆生諸有所作舉足下足當知皆是從道場中來住于佛法矣且道即今如何是諸檀護道場夙願功德修習般若萬行安坐水月道場財法等無有二證成佛果津梁下座三府李護法孝子薦嚴請上堂師云昔那吒太子析骨還父析肉還母然後現本身運大神力為父母說法可為報答深恩特酬罔極讀蓼莪之篇始信親恩浩渺誦鶺鴿之什方知手足情深手足情深不忍離合親恩浩渺報答宜先佛力法力三寶力戒香定香智慧香善來諸佛子一一聽舉揚愚癡成智慧熱惱得清涼蓮邦教主親垂手寶蓋飛幢發異光若也于斯真薦得者回親見本爺娘若識得本生爺娘面目方識得自己面目若識得自己面目方識得大人本來真面目且道如何是大人真面目本來真父母歷劫不曾離孝子薦親一句又作麼生門前但看荊花茂便是爺娘極樂場下座藏圓解制上堂九旬禪期魚游網三月安居鳥入籠怎似護國閲經叟無拘無束自從容打鳳羅龍須憑師資妙手扶豎綱宗全仗輔弼鉗鎚兄呼弟應共相激揚交為肘臂互作主賓可為就爐作灶遇水安橋竿木隨身逢場作戲自能隨處作主遇緣即宗用舍行藏無可不可百日內聚首商量浩浩三月間安居前三後三人人金聲玉振個個動地放光曲演無生唱拍和鳴高山流水期遇知音有時翻經于藏閣有時嘯傲于長廊有時賓主于問答有時坐臥于經行粥飯二時雜心匪間或慈或威即理即事把住放行自由自在拈一莖草作丈六金身將丈六金身作一莖草用堂未升而法席先卷田未開而大義齊彰聖方祝而國祚永固檀方報而祿算增延目繫花鳥眼觀遊人任意舒懷隨緣放曠種種宣揚無非佛事今經藏期圓文彩已彰不落文字一句又作麼生掬水月在手弄花香滿衣素緇添氣象今古意自暉下座示衆新年示衆日月無新舊人心有去來但能憎愛盡正眼頂門開如何是新年頭佛法張公喫酒李公醉得銜杯處且銜杯觀世音菩薩將錢買胡餅放下手原來卻是饅頭北方多喫麵雲門扇子𨁝跳上三十二天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾不妨劈面將來滿盤托出常住淡泊聊借古人茶飯以為供養隨家豐儉莫厭粗疏即今春日融和應時納祜一句又作麼生但願東風齊著力一時吹入我門來示衆不施寸刃力破重圍不涉階梯頓超十地氣吞佛祖眼蓋乾坤縱奪隨宜卷舒自在所以道以大圓覺為我伽藍身心以安居平等性智正眼觀來何異無繩自縛劃地為牢護國者裡又則不然收放在我去住自由驀呈柱杖云風流不在傳紅粉肌骨生成分外奇乾峰示衆云舉一不得舉二放過一著落在第二乾峰老子雖是握節當胸未免守死善道若是誠上座舉一不妨舉二栴檀林內栴檀獅子窟中獅子一不致過二非落節萬里無雲萬里天千江有水千江月秪如雲門出衆云昨日有人從天台來卻往徑山去乾峰呼典座來日不得普請要且如何論量又作麼生參師誕日示衆云諸佛非我道誰是最道者父母非我親誰是最親者到者裏未免有耳如聾有口如啞卓拄杖云等閒一箭落雙鵰笑倒東村王大姐所以道負恩者多知恩者少且作麼生是知恩報恩一句復卓拄杖云切莫鑽龜打瓦示周子文學來諭不欺二字是成佛作祖出生死的真種子也從上諸佛諸祖開示多矣謾居士一點不得然此自證一著子惟悟者相應他人說的總不中用古云但辦肯心決不相賺示衆黃面老子道惟此一事實餘二則非真作麼生是餘二成佛作祖者是既是成佛作祖尚喚作餘二畢竟如何是此一事乃云待我藏圓期滿向汝道破師云龐居士問石頭不侶萬法話石掩其口龐于此有省如何是他省處又於馬祖機下大悟如何是他悟處師云一口吸盡西江水話有者解作一物不存三十年後大有人簡點在如是畢竟如何會
